<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rahlat Aman - Reset Password</title>

<style>
:root {
  --primary-blue: #036DA9;
  --accent-gold: #F4BC5A;
  --error: #ff4757;
  --success: #2ed573;
}

body {
  margin: 0;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  height: 100vh;
  /* المحافظة الكاملة على خلفيتك والتدرج اللوني المعتمد */
  background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url("login.png") center/cover no-repeat;
  display: flex;
  justify-content: center;
  align-items: center;
}

.forgot-box {
  background: rgba(255, 255, 255, 0.1);
  backdrop-filter: blur(15px);
  padding: 40px;
  border-radius: 30px;
  width: 350px;
  border: 1px solid rgba(255, 255, 255, 0.2);
  box-shadow: 0 25px 50px rgba(0,0,0,0.3);
  color: white;
  text-align: center;
  position: relative;
  animation: fadeIn 0.6s ease-out;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.back-circle {
  position: absolute;
  top: -20px;
  left: -20px;
  background: var(--accent-gold);
  color: #036DA9;
  width: 45px;
  height: 45px;
  border-radius: 50%;
  display: flex;
  justify-content: center;
  align-items: center;
  text-decoration: none;
  font-weight: bold;
  box-shadow: 0 5px 15px rgba(244, 188, 90, 0.4);
  cursor: pointer;
  transition: 0.3s;
}

.back-circle:hover {
  transform: scale(1.1);
  background: white;
}

h2 { margin-bottom: 10px; font-weight: 600; }
p { font-size: 14px; opacity: 0.8; margin-bottom: 30px; }

.input-group {
  margin-bottom: 20px;
  text-align: left;
}

label { font-size: 12px; margin-left: 5px; color: var(--accent-gold); }

input {
  width: 100%;
  padding: 12px 15px;
  margin-top: 5px;
  border: none;
  border-radius: 12px;
  background: rgba(255, 255, 255, 0.9);
  box-sizing: border-box;
  font-size: 16px;
  transition: 0.3s;
  color: #0f172a;
}

input:focus {
  outline: none;
  box-shadow: 0 0 0 3px var(--accent-gold);
}

.btn-send {
  width: 100%;
  padding: 15px;
  background: var(--accent-gold);
  color: var(--primary-blue);
  border: none;
  border-radius: 12px;
  font-size: 16px;
  font-weight: 800;
  cursor: pointer;
  transition: 0.3s;
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 10px;
}

.btn-send:hover {
  background: white;
  transform: translateY(-2px);
}

/* رسائل الحالة */
.status-msg {
  margin-top: 20px;
  font-size: 14px;
  padding: 10px;
  border-radius: 8px;
  display: none;
}
.error { background: rgba(255, 71, 87, 0.2); color: #ff4757; border: 1px solid #ff4757; }
.success { background: rgba(46, 213, 115, 0.2); color: #2ed573; border: 1px solid #2ed573; }
</style>
</head>
<body>

<div class="forgot-box">
  <div class="back-circle" onclick="goBack()">⬅</div>
  
  <h2>Reset Password</h2>
  <p>Enter your email to receive a secure reset link.</p>

  <div class="input-group">
    <label>REGISTERED EMAIL</label>
    <input type="email" id="userEmail" placeholder="example@mail.com">
  </div>

  <button class="btn-send" id="resetBtn" onclick="handleReset()">
    SEND RESET LINK <span>→</span>
  </button>

  <div id="statusBox" class="status-msg"></div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getAuth, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

  // تم تحديث مفاتيح الفايربيس الحية والخاصة بنظام رحلات أمان بنجاح هنا
  const firebaseConfig = {
      apiKey: "AIzaSyBz8I_y4VfRaJiFAh32Y07KOwPrVjytt_Q",
      authDomain: "rahlataman-bus-safety-app.firebaseapp.com",
      projectId: "rahlataman-bus-safety-app",
      storageBucket: "rahlataman-bus-safety-app.firebasestorage.app",
      messagingSenderId: "1088859717905",
      appId: "1:1088859717905:web:e65d7054db709e274dccb0",
      measurementId: "G-SRY2J762GZ"
  };

  // تهيئة الخدمة السحابية للأمان
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  // جعل دالة الرجوع متاحة عالمياً للـ HTML
  window.goBack = function() {
      window.location.href = "login.html";
  }

  // تفعيل محرك استعادة الباسورد السحابي الفعلي
  window.handleReset = async function() {
      const emailInput = document.getElementById("userEmail");
      const statusBox = document.getElementById("statusBox");
      const btn = document.getElementById("resetBtn");
      
      const email = emailInput.value.trim();
      statusBox.style.display = "none";

      if (!email) {
          showStatus("Please enter your email address.", "error");
          return;
      }

      // تحويل حالة الزر بصرياً أثناء الاتصال بالسيرفر
      btn.innerHTML = "SENDING...";
      btn.style.opacity = "0.7";
      btn.disabled = true;

      try {
          // استدعاء أمر جوجل لإرسال رابط إعادة التعيين المشفر لصندوق بريد المستخدم
          await sendPasswordResetEmail(auth, email);
          
          showStatus("Success! A secure reset link has been sent to your email inbox.", "success");
          emailInput.value = ""; // تفريغ الحقل تلقائياً بعد النجاح

      } catch (error) {
          console.error("Reset Password Error: ", error);
          
          // إدارة وفحص نوع الخطأ القادم من السيرفر لعرضه للجنة التحكيم
          if (error.code === "auth/user-not-found") {
              showStatus("This email is not registered in our system.", "error");
          } else if (error.code === "auth/invalid-email") {
              showStatus("Please enter a valid email address structure.", "error");
          } else {
              showStatus("Connection failed or setup pending. Please check your Cloud Environment.", "error");
          }
      } finally {
          // إعادة الزر لوضعه الطبيعي بعد انتهاء المحاولة
          btn.innerHTML = "SEND RESET LINK <span>→</span>";
          btn.style.opacity = "1";
          btn.disabled = false;
      }
  }

  function showStatus(text, type) {
      const statusBox = document.getElementById("statusBox");
      statusBox.innerText = text;
      statusBox.className = "status-msg " + type;
      statusBox.style.display = "block";
  }
</script>

</body>
</html>
