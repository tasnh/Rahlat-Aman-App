<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background: #f8fafc; }
        .glass-card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.3); transition: transform 0.3s ease; }
        .glass-card:hover { transform: scale(1.02); }
        .star-active { color: #fbbf24; transform: scale(1.2); transition: all 0.2s; }
        .rating-star { transition: all 0.2s; cursor: pointer; }
        .rating-star:hover { transform: scale(1.3); }
    </style>
</head>
<body class="p-4 md:p-10">

    <header class="max-w-4xl mx-auto mb-10 flex justify-between items-center">
        <h1 class="text-3xl font-extrabold text-blue-900">سجل إنجازات الطالب</h1>
        <button onclick="window.history.back()" class="bg-white px-5 py-2 rounded-xl shadow-sm hover:bg-slate-50 font-bold text-blue-900 border border-slate-200">
            <i class="fa-solid fa-arrow-right ml-2"></i> عودة
        </button>
    </header>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 max-w-4xl mx-auto mb-12">
        <div class="glass-card p-6 rounded-3xl text-center shadow-sm border-b-4 border-cyan-500">
            <h2 id="totalPoints" class="text-4xl font-black text-cyan-600">0</h2>
            <p class="text-slate-500">إجمالي النقاط</p>
        </div>
        <div class="glass-card p-6 rounded-3xl text-center shadow-sm border-b-4 border-blue-600">
            <h2 id="totalGames" class="text-4xl font-black text-blue-700">0</h2>
            <p class="text-slate-500">عدد الألعاب</p>
        </div>
        <div class="glass-card p-6 rounded-3xl text-center shadow-sm border-b-4 border-yellow-500">
            <h2 id="avgRating" class="text-4xl font-black text-yellow-500">0</h2>
            <p class="text-slate-500">متوسط التقييم</p>
        </div>
    </div>

    <div id="activities-container" class="max-w-4xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-6">
        </div>

    <div id="toast" class="hidden fixed bottom-10 left-10 bg-emerald-600 text-white px-6 py-4 rounded-2xl shadow-2xl flex items-center gap-3 animate-bounce">
        <i class="fa-solid fa-circle-check text-2xl"></i>
        <span class="font-bold">تم حفظ تقييمك بنجاح!</span>
    </div>

    <script type="module">
        // استيراد Firebase (نفس الإعدادات السابقة)
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, doc, setDoc, getDocs, collection, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
        
        const firebaseConfig = { /* ضع بياناتك هنا */ };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // أصوات تفاعلية
        const clickSound = new Audio('https://actions.google.com/sounds/v1/ui/click.ogg');
        const successSound = new Audio('https://actions.google.com/sounds/v1/ui/complete.ogg');

        window.rateGame = (gameId, value) => {
            clickSound.play();
            const card = document.querySelector(`[data-game="${gameId}"]`);
            card.dataset.rating = value;
            const stars = card.querySelectorAll(".rating-star");
            stars.forEach((star, index) => {
                star.className = index < value ? "fa-solid fa-star rating-star star-active" : "fa-regular fa-star rating-star text-slate-300";
            });
        };

        window.triggerSave = async (gameId) => {
            const card = document.querySelector(`[data-game="${gameId}"]`);
            const rating = card.dataset.rating || 0;
            
            // تنفيذ الحفظ في Firebase
            successSound.play();
            const toast = document.getElementById('toast');
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 3000);
        };

        // دالة عرض الكروت (مثال للتحسين)
        async function loadStudentGames() {
            const container = document.getElementById("activities-container");
            // ... (منطق جلب البيانات من Firebase)
            
            // شكل الكارت الجديد المحسن
            container.innerHTML = `
            <div data-game="1" class="glass-card p-6 rounded-3xl shadow-lg border border-slate-100">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-xl font-bold text-slate-800">لعبة الفضاء</h3>
                    <span class="bg-blue-50 text-blue-600 px-3 py-1 rounded-lg font-bold text-xs">50 XP</span>
                </div>
                <div class="flex gap-1 mb-6 text-2xl" id="stars-1">
                    ${[1,2,3,4,5].map(i => `<i class="fa-regular fa-star rating-star text-slate-300" onclick="rateGame('1', ${i})"></i>`).join('')}
                </div>
                <button onclick="triggerSave('1')" class="w-full bg-slate-900 text-white py-3 rounded-2xl font-bold hover:bg-blue-700 transition">حفظ التقييم</button>
            </div>`;
        }
        loadStudentGames();
    </script>
</body>
</html>
