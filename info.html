<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Information | Rahlat Aman</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">

<style>
:root {
    --primary-dark: #0f172a;
    --accent-blue: #38bdf8;
    --gold: #E59E47;
    --white: #ffffff;
}

body, html {
    margin: 0;
    padding: 0;
    height: 100%;
    font-family: 'Plus Jakarta Sans', sans-serif;
    background-color: var(--primary-dark);
}

.container {
    height: 100vh;
    /* تم تغيير الخلفية لتصبح صورة 11.png مع طبقة تعتيم ناعمة لضمان وضوح النص */
    background-image: linear-gradient(to bottom, rgba(15, 23, 42, 0.1), rgba(15, 23, 42, 0.7)), url("info.png");
    background-size: cover;
    background-position: center;
    display: flex;
    flex-direction: column;
    justify-content: flex-end; /* دفع البطاقة للأسفل */
}

/* البطاقة الزجاجية السفلية */
.info-card {
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-radius: 40px 40px 0 0;
    padding: 40px 30px;
    border: 1px solid rgba(255, 255, 255, 0.1);
    text-align: center;
    transform: translateY(100px);
    animation: slideUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
}

.title {
    font-size: 32px;
    font-weight: 800;
    color: var(--white);
    margin-bottom: 15px;
}

.title span {
    color: var(--accent-blue);
}

.text {
    font-size: 16px;
    line-height: 1.6;
    color: rgba(255, 255, 255, 0.9); /* تقوية لون النص قليلاً للوضوح */
    margin-bottom: 40px;
    max-width: 100%;
}

.btn {
    width: 100%;
    background: linear-gradient(135deg, var(--gold) 0%, #d97706 100%);
    color: white;
    padding: 18px;
    border-radius: 20px;
    border: none;
    font-size: 18px;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 10px 20px rgba(229, 158, 71, 0.3);
    transition: all 0.3s ease;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
}

.btn:active {
    transform: scale(0.95);
}

/* الأيقونات المنقطة */
.dot-container {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-bottom: 20px;
}

.dot {
    width: 8px;
    height: 8px;
    background: rgba(255, 255, 255, 0.2);
    border-radius: 50%;
}

.dot.active {
    width: 24px;
    background: var(--accent-blue);
    border-radius: 10px;
}

@keyframes slideUp {
    to { transform: translateY(0); }
}
</style>
</head>

<body>

<div class="container">
    <div class="info-card">
        <div class="dot-container">
            <div class="dot active"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>

        <div class="title">Rahlat <span>Aman</span></div>

        <div class="text">
            Safe journeys start with smart solutions. 
            A system designed to protect, track, and educate students during school transportation.
        </div>

        <button class="btn" onclick="goNext()">
            Get Started 
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
        </button>
    </div>
</div>

<script>
function goNext() {
    document.querySelector('.info-card').style.transform = 'translateY(100%)';
    document.querySelector('.info-card').style.transition = '0.5s ease-in';
    
    setTimeout(() => {
        window.location.href = "landuage.html";
    }, 400);
}
</script>

</body>
</html>
