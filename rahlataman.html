<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rahlat Aman | Loading...</title>
    <style>
        :root {
            --primary-bg: #9ACCFA; /* لون كحلي عميق ليعطي فخامة */
            --accent-blue: #3f517a;
            --gold: #e0c158;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--primary-bg);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        #splash {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        /* تأثير الإضاءة خلف اللوجو */
        .logo-glow {
            position: absolute;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(24, 119, 160, 0.2) 0%, rgba(15, 23, 42, 0) 70%);
            top: -35px;
            z-index: 0;
            animation: pulse 2s infinite ease-in-out;
        }

        #splash img {
            width: 150px;
            z-index: 1;
            filter: drop-shadow(0 0 10px rgba(56, 189, 248, 0.3));
            animation: zoomIn 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #splash h1 {
            color: #ebe8e8;
            font-size: 32px;
            margin: 20px 0 5px 0;
            letter-spacing: 2px;
            font-weight: 700;
            opacity: 0;
            animation: fadeInUp 0.8s forwards 0.5s;
        }

        #splash p {
            color: var(--accent-blue);
            font-size: 16px;
            margin: 0;
            font-weight: 300;
            letter-spacing: 1px;
            text-transform: uppercase;
            opacity: 0;
            animation: fadeInUp 0.8s forwards 0.8s;
        }

        /* شريط التحميل الصغير */
        .loader-container {
            width: 120px;
            height: 3px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            margin-top: 40px;
            overflow: hidden;
            opacity: 0;
            animation: fadeIn 0.5s forwards 1s;
        }

        .loader-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, var(--accent-blue), var(--gold));
            box-shadow: 0 0 10px var(--accent-blue);
            animation: loadProgress 2.5s ease-in-out forwards;
        }

        /* Animations */
        @keyframes zoomIn {
            from { transform: scale(0.5); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        @keyframes fadeInUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.2; }
            50% { transform: scale(1.2); opacity: 0.4; }
        }

        @keyframes loadProgress {
            0% { width: 0%; }
            100% { width: 100%; }
        }
    </style>
</head>
<body>

<div id="splash">
    <div class="logo-glow"></div>
    <img src="logo.png" alt="Rahlat Aman Logo">

    <h1>Rahlat Aman</h1>
    <p>Smart Transportation Safety</p>

    <div class="loader-container">
        <div class="loader-bar"></div>
    </div>
</div>
<script>
    // المدة 3 ثوانٍ قبل الانتقال
    setTimeout(() => {
        // إضافة تأثير خروج (اختياري)
        document.body.style.transition = "opacity 0.5s ease";
        document.body.style.opacity = "0";
        
        setTimeout(() => {
            window.location.href = "info.html";
        }, 500);
    }, 4000);
</script>

</body>
</html>
