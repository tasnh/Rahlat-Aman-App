<!DOCTYPE html>
<html>
<head>
<title>Course</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#EEF5FB;
}

/* HEADER */
.header{
  background:#036DA9;
  color:white;
  padding:15px;
  display:flex;
  align-items:center;
  gap:10px;
}

.back{
  font-size:22px;
  cursor:pointer;
}

/* VIDEO */
iframe{
  width:100%;
  height:500px;
}

/* LEVEL BAR 🔥 */
.level-box{
  background:white;
  margin:10px;
  padding:10px;
  border-radius:10px;
}

.level-bar{
  height:12px;
  background:#ddd;
  border-radius:10px;
}

.level-fill{
  height:100%;
  background:#4CAF50;
  border-radius:10px;
}

/* QUESTION */
.q-box{
  background:white;
  margin:15px;
  padding:20px;
  border-radius:15px;
}

.question-text{
  font-size:20px;
  font-weight:bold;
  color:#222;
  margin-bottom:10px;
}

.option{
  padding:12px;
  margin:8px 0;
  border-radius:10px;
  background:#ddd;
  cursor:pointer;
}

.correct{background:#2ecc71;color:white;}
.wrong{background:#e74c3c;color:white;}

.retry{
  background:orange;
  color:white;
  padding:6px 10px;
  border-radius:8px;
  display:inline-block;
  margin-top:5px;
  cursor:pointer;
}

/* RESULT */
.result{
  text-align:center;
  display:none;
  padding:20px;
}

/* 🎁 REWARD */
.reward{
  display:none;
  text-align:center;
  font-size:22px;
  color:#f39c12;
  font-weight:bold;
}

/* CERTIFICATE */
.certificate{
  display:none;
  background:linear-gradient(135deg,#fff,#e3f2fd);
  padding:40px;
  margin:20px;
  border:8px solid gold;
  border-radius:25px;
  text-align:center;
  position:relative;
}

.stamp{
  position:absolute;
  bottom:20px;
  right:20px;
  color:red;
  transform:rotate(-15deg);
  border:2px solid red;
  padding:5px;
}

.sign{
  margin-top:30px;
  font-style:italic;
}

/* 🎊 */
.confetti-bg{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
}

/* 🧍‍♂️ شخصية متحركة */
#character{
  position:fixed;
  bottom:20px;
  left:20px;
  animation:bounce 2s infinite;
}

@keyframes bounce{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-10px);}
}

#bubble{
  background:white;
  padding:10px;
  border-radius:15px;
  margin-top:5px;
}

/* 🏆 Achievement */
.achievement{
  display:none;
  background:#2ecc71;
  color:white;
  padding:15px;
  margin:10px;
  border-radius:10px;
  text-align:center;
}

</style>
</head>

<body>

<div class="header">
<div class="back" onclick="back()">←</div>
<h3>Course</h3>
</div>

<iframe id="video"></iframe>

<!-- 🔥 LEVEL -->
<div class="level-box">
<p>Level Progress</p>
<div class="level-bar">
<div class="level-fill" id="levelFill"></div>
</div>
</div>

<!-- 🧍‍♂️ -->
<div id="character">
<img src="https://cdn-icons-png.flaticon.com/512/4140/4140048.png" width="90">
<div id="bubble">Hi 👋</div>
</div>

<div id="questions"></div>

<div class="reward" id="reward">🎁 +10 Coins Earned!</div>

<div class="achievement" id="achieve">🏆 Achievement Unlocked!</div>

<div class="q-box">
<p>✍️ What did you learn?</p>
<textarea style="width:90%;height:80px;"></textarea>
</div>

<div class="result" id="result">
<h2>🎉 Amazing!</h2>
<p id="score"></p>
<button onclick="showCertificate()">🎓 Certificate</button>
</div>

<div class="certificate" id="cert">
<h1>🎓 Certificate</h1>
<p>This certifies</p>
<h2 id="studentName"></h2>
<p>Completed Safety Course</p>
<p id="finalScore"></p>

<div class="stamp">Rahlat Aman ✔</div>
<div class="sign">Signature: Team</div>

<button onclick="print()">🖨️ Print</button>
</div>

<script>

let xp=0;

let videos=[
"https://www.youtube.com/embed/8Hrc_gcIUrU",
"https://www.youtube.com/embed/k2ygGvgQ0wQ",
"https://www.youtube.com/embed/5I61Xt7kCrE",
"https://www.youtube.com/embed/XdKp9lgrEGw",
"https://www.youtube.com/embed/b45AGmJ-YnA",
"https://www.youtube.com/embed/ttnQIHGu6rE",
"https://www.youtube.com/embed/HTtomc6UR8w",
"https://www.youtube.com/embed/uOzjH-rWmvc"
];

let questions=[[
{q:"Why stay seated?",options:["Safe","Fun"],correct:0},
{q:"Distracting driver?",options:["Safe","Danger"],correct:1},
{q:"Follow rules?",options:["Yes","No"],correct:0},
{q:"Listen to?",options:["Supervisor","Friends"],correct:0}
]];

let course=localStorage.getItem("course")||1;
document.getElementById("video").src=videos[course-1];

let qs=questions[0];
let container=document.getElementById("questions");

let score=0;
let answered=0;

qs.forEach((q,i)=>{

let html=`<div class="q-box">
<p class="question-text">${q.q}</p>
<button onclick="speak('${q.q}')">🔊 Listen</button>
`;

q.options.forEach((opt,index)=>{
html+=`<div class="option" onclick="answer(this,${index},${q.correct},${i})">${opt}</div>`;
});

html+=`<div id="retry${i}"></div></div>`;
container.innerHTML+=html;

});

/* 🔊 */
function speak(text){
let speech=new SpeechSynthesisUtterance(text);
speechSynthesis.speak(speech);
}

/* 🧍‍♂️ */
function talk(msg){
document.getElementById("bubble").innerText=msg;
let s=new SpeechSynthesisUtterance(msg);
speechSynthesis.speak(s);
}

talk("Let's start learning 🎓");

function answer(el,index,correct,qIndex){

let options=el.parentElement.querySelectorAll(".option");
options.forEach(o=>o.classList.remove("correct","wrong"));

if(index==correct){
el.classList.add("correct");
score+=5;
xp+=25;
answered++;
talk("Great job!");

updateLevel();

}else{
el.classList.add("wrong");
talk("Try again");

document.getElementById("retry"+qIndex).innerHTML=
`<div class="retry" onclick="resetQ(this)">🔁 Retry</div>`;
}

if(answered==qs.length) finish();
}

function updateLevel(){
let percent=(xp/100)*100;
document.getElementById("levelFill").style.width=percent+"%";
}

function resetQ(btn){
let box=btn.parentElement.parentElement;
box.querySelectorAll(".option").forEach(o=>o.classList.remove("correct","wrong"));
btn.remove();
answered--;
}

function finish(){
document.getElementById("result").style.display="block";
document.getElementById("reward").style.display="block";
document.getElementById("achieve").style.display="block";

let coins=parseInt(localStorage.getItem("coins")||0);
coins+=10;
localStorage.setItem("coins",coins);

localStorage.setItem("progress"+course,100);

document.getElementById("score").innerText="Score: "+score;

confetti();
sound();
talk("You are amazing!");
}

function confetti(){
let c=document.createElement("div");
c.className="confetti-bg";

for(let i=0;i<50;i++){
let d=document.createElement("div");
d.style.position="absolute";
d.style.width="8px";
d.style.height="8px";
d.style.background="hsl("+Math.random()*360+",100%,50%)";
d.style.top=Math.random()*100+"%";
d.style.left=Math.random()*100+"%";
c.appendChild(d);
}

document.body.appendChild(c);
setTimeout(()=>c.remove(),2000);
}

function sound(){
new Audio("https://assets.mixkit.co/sfx/preview/mixkit-happy-kids-cheering-2271.mp3").play();
}

function showCertificate(){
let name=localStorage.getItem("studentName")||"Student";
document.getElementById("studentName").innerText=name;
document.getElementById("finalScore").innerText="Score: "+score;
document.getElementById("cert").style.display="block";
}

function back(){
window.location.href="student_dashboard.html";
}

</script>

</body>
</html>
